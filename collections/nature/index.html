<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
        <link rel="manifest" href="../../manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../../background/app.png" />
  <link rel="icon" type="image/png" href="../../background/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music — Tiago Coelho</title>
  <link rel="stylesheet" href="../../main.css" />
  <style>
    html {
      overflow-y: auto;
    }

    body {
      display: block;
      overflow-y: auto;
      overflow-x: hidden;
      height: auto;
      background: #0a0a0a;
    }

    /* ── Header space so content clears the fixed top bar ── */
    .gallery-header {
      height: 10rem;
    }

    /* ── 3-column masonry grid ──────────────────────────── */
    .gallery {
      display: flex;
      gap: 3px;
      padding: 0 15rem 10rem; /* side margins + bottom clears music island */
      align-items: flex-start;
    }

    @media (max-width: 768px) {
      .gallery { padding: 0 1rem 80px; }
    }

    .gallery__col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    /* ── Individual photo item ──────────────────────────── */
    .gallery__item {
      position: relative;
      overflow: hidden;
      background: #111;
    }

    /* aspect-ratio box — height set via padding-bottom in JS */
    .gallery__item-inner {
      position: relative;
      width: 100%;
    }

    .gallery__item img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .gallery__item img.loaded {
      opacity: 1;
    }

    .gallery__item img:hover {
      opacity: 0.85;
    }

    /* ── Lightbox ───────────────────────────────────────── */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    #lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    #lightbox-img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      display: block;
      border-radius: 2px;
    }

    .lightbox__close {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.8rem;
      line-height: 1;
      padding: 0.4rem;
      transition: color 0.15s;
      z-index: 101;
    }

    .lightbox__close:hover { color: #fff; }

    .lightbox__nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 2.6rem;
      line-height: 1;
      padding: 1rem 1.2rem;
      transition: color 0.15s;
      z-index: 101;
    }

    .lightbox__nav:hover { color: #fff; }
    .lightbox__nav--prev { left: 0; }
    .lightbox__nav--next { right: 0; }

    /* ── Back button ────────────────────────────────────── */
    #back-btn {
      position: fixed;
      top: 3.7rem;
      left: 2rem;
      z-index: 10;
      color: rgba(255,255,255,0.6);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-decoration: none;
      text-transform: uppercase;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5));
      transition: color 0.2s ease;
    }

    #back-btn:hover { color: #fff; }

    /* ── Collection name label ──────────────────────────── */
    #collection-title {
      position: fixed;
      top: 3.55rem;
      right: 2rem;
      z-index: 10;
      color: rgba(255,255,255,0.3);
      font-size: 0.55rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Hide theme toggle ──────────────────────────────── */
    #theme-toggle { display: none; }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .gallery { gap: 2px; padding: 0 2px 80px; }
      .gallery__col { gap: 2px; }
      .lightbox__nav { font-size: 2rem; padding: 0.8rem; }
    }
  </style>
</head>
